<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - Biblioteca UEL'">Biblioteca UEL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- menu lateral usado em todas as paginas -->
<nav th:fragment="sidebar(ativo)" class="sidebar d-flex flex-column">
    <div class="sidebar-logo">
        <i class="bi bi-book-half"></i>
        <span>Biblioteca UEL</span>
    </div>

    <ul class="nav flex-column sidebar-menu">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${ativo == 'home'} ? 'active'" th:href="@{/}">
                <i class="bi bi-grid"></i> Visão Geral
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${ativo == 'livros'} ? 'active'" th:href="@{/livros}">
                <i class="bi bi-book"></i> Livros
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${ativo == 'alunos'} ? 'active'" th:href="@{/alunos}">
                <i class="bi bi-people"></i> Alunos
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${ativo == 'emprestimos'} ? 'active'" th:href="@{/emprestimos/novo}">
                <i class="bi bi-arrow-left-right"></i> Empréstimos
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${ativo == 'devolucoes'} ? 'active'" th:href="@{/devolucoes/nova}">
                <i class="bi bi-arrow-return-left"></i> Devoluções
            </a>
        </li>
    </ul>

    <div class="sidebar-footer mt-auto">
        <i class="bi bi-person-circle"></i>
        <span>Bibliotecária</span>
    </div>
</nav>

<!-- alertas de sucesso e erro exibidos apos as operacoes -->
<div th:fragment="alertas">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>


<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>
