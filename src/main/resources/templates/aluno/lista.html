<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Alunos')}"></head>
<body>

<nav th:replace="~{fragments/layout :: sidebar('alunos')}"></nav>

<main class="conteudo">
    <div class="d-flex justify-content-between align-items-start mb-2">
        <div>
            <h1 class="titulo-pagina">Alunos</h1>
            <p class="subtitulo-pagina">Alunos cadastrados no sistema da biblioteca</p>
        </div>
        <a th:href="@{/alunos/novo}" class="btn btn-primary">
            <i class="bi bi-person-plus"></i> Novo Aluno
        </a>
    </div>

    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="card card-tabela">
        <div class="card-body">
            <!-- busca simples feita no navegador -->
            <div class="input-group mb-3" style="max-width: 380px;">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" id="campoBusca" class="form-control"
                       placeholder="Buscar por nome ou RA...">
            </div>

            <div class="table-responsive">
                <table class="table" id="tabelaAlunos">
                    <thead>
                    <tr>
                        <th>Nome</th>
                        <th>RA</th>
                        <th>Situação</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="aluno : ${alunos}">
                        <td th:text="${aluno.nome}">Nome</td>
                        <td th:text="${aluno.ra}">RA</td>
                        <td>
                            <span th:if="${aluno.possuiDebito}" class="badge text-bg-danger">Com débito</span>
                            <span th:if="${!aluno.possuiDebito}" class="badge text-bg-success">Regular</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(alunos)}">
                        <td colspan="3" class="text-center text-muted">Nenhum aluno cadastrado ainda.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    // filtro da tabela conforme o usuario digita na busca
    document.getElementById('campoBusca').addEventListener('input', function () {
        const termo = this.value.toLowerCase();
        document.querySelectorAll('#tabelaAlunos tbody tr').forEach(function (linha) {
            linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
        });
    });
</script>
</body>
</html>
